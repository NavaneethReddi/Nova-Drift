<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Nova Drift — Space Shooter</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#03010a;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:monospace;overflow:hidden}
  canvas{display:block;max-width:100vw;max-height:100vh;image-rendering:crisp-edges;cursor:crosshair;}
  #info{color:rgba(100,180,255,0.4);font-size:11px;margin-top:8px;letter-spacing:.1em;text-align:center}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="info">ARROW KEYS / WASD / MOUSE / TOUCH TO MOVE &nbsp;·&nbsp; AUTO-FIRE ENABLED</div>
<script>
const c=document.getElementById('c');
const ctx=c.getContext('2d');

// Responsive sizing
const BASE_W=480, BASE_H=640;
let W=BASE_W, H=BASE_H, SCALE=1;
function resize(){
  const sw=window.innerWidth, sh=window.innerHeight-40;
  SCALE=Math.min(sw/BASE_W,(sh)/BASE_H,1.4);
  W=BASE_W; H=BASE_H;
  c.width=W; c.height=H;
  c.style.width=Math.round(W*SCALE)+'px';
  c.style.height=Math.round(H*SCALE)+'px';
}
resize();
window.addEventListener('resize',resize);

// Constants
const PLAYER_SPEED=4.5;
const BULLET_SPEED=11;
const FIRE_RATE=140; // ms

// Utils
const rand=(n,min=0)=>Math.random()*n+min;
const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
const lerp=(a,b,t)=>a+(b-a)*t;
const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);

// State
let state='menu';
let score=0,hiScore=0,wave=1,waveTimer=0;
let stars=[],bullets=[],eBullets=[],enemies=[],particles=[],powerups=[];
let player={};
let keys={},mousePos=null,touchPos=null,lastTime=0,fireTimer=0;
let shake={x:0,y:0,t:0},combo=0,comboTimer=0;
let spawnQueue=[],spawnTimer=0,allSpawned=false;
let nebulaCanvas=null;

// Input
window.addEventListener('keydown',e=>{keys[e.key]=true;if(e.key==='Enter'||e.key===' '){e.preventDefault();tryStart();}});
window.addEventListener('keyup',e=>{keys[e.key]=false;});
c.addEventListener('mousemove',e=>{
  const r=c.getBoundingClientRect();
  mousePos={x:(e.clientX-r.left)/SCALE,y:(e.clientY-r.top)/SCALE};
});
c.addEventListener('mouseleave',()=>{mousePos=null;});
c.addEventListener('click',()=>tryStart());
c.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0];const r=c.getBoundingClientRect();touchPos={x:(t.clientX-r.left)/SCALE,y:(t.clientY-r.top)/SCALE};tryStart();},{passive:false});
c.addEventListener('touchmove',e=>{e.preventDefault();const t=e.touches[0];const r=c.getBoundingClientRect();touchPos={x:(t.clientX-r.left)/SCALE,y:(t.clientY-r.top)/SCALE};},{passive:false});
c.addEventListener('touchend',()=>{touchPos=null;});

function tryStart(){if(state==='menu'||state==='gameover')startGame();}

// Nebula background
function buildNebula(){
  nebulaCanvas=document.createElement('canvas');
  nebulaCanvas.width=W;nebulaCanvas.height=H;
  const nc=nebulaCanvas.getContext('2d');
  const blob=(x,y,r,col)=>{const g=nc.createRadialGradient(x,y,0,x,y,r);g.addColorStop(0,col);g.addColorStop(1,'transparent');nc.fillStyle=g;nc.fillRect(0,0,W,H);};
  blob(80,200,200,'rgba(40,0,90,0.45)');
  blob(400,380,220,'rgba(0,40,90,0.38)');
  blob(240,520,160,'rgba(70,0,50,0.32)');
  blob(W-80,120,170,'rgba(0,60,90,0.32)');
  blob(W/2,H/2,280,'rgba(20,0,40,0.2)');
}

function initStars(){
  stars=[];
  for(let i=0;i<90;i++) stars.push({x:rand(W),y:rand(H),r:rand(0.8)+0.3,spd:0.25,op:rand(0.5)+0.2,tw:0});
  for(let i=0;i<45;i++) stars.push({x:rand(W),y:rand(H),r:rand(1.0)+0.7,spd:0.65,op:rand(0.4)+0.3,tw:0});
  for(let i=0;i<18;i++) stars.push({x:rand(W),y:rand(H),r:rand(1.4)+1.2,spd:1.5,op:rand(0.4)+0.5,tw:rand(0.04)+0.01});
}

function startGame(){
  state='playing';
  score=0;wave=1;waveTimer=0;fireTimer=0;
  bullets=[];eBullets=[];enemies=[];particles=[];powerups=[];
  combo=0;comboTimer=0;shake={x:0,y:0,t:0};
  player={x:W/2,y:H*0.82,vx:0,vy:0,lives:3,shield:false,shieldTimer:0,triple:false,tripleTimer:0,speed:PLAYER_SPEED,invince:0,hitFlash:0,thr:0};
  buildWave(1);
}

// Wave system
function buildWave(w){
  spawnQueue=[];allSpawned=false;spawnTimer=0;
  const b=(w-1)%10;
  const mul=Math.floor((w-1)/10);
  const extra=mul;
  const pats=[
    [[0,6,30]],
    [[0,9,25],[1,2,45]],
    [[1,5,38],[0,5,22]],
    [[0,6,20],[1,4,32],[2,1,65]],
    [[3,1,0]],
    [[1,7,28],[0,6,20]],
    [[2,3,55],[1,5,30]],
    [[0,9,18],[2,4,48]],
    [[1,7,25],[2,4,46],[0,4,18]],
    [[3,1,0],[0,7,22]],
  ];
  const pat=pats[b];
  let t=0;
  for(let [type,count,delay] of pat){
    const total=count+extra;
    for(let i=0;i<total;i++){
      t+=delay+(i===0?0:0);
      spawnQueue.push({type,at:t});
      t+=delay*0.4;
    }
  }
  spawnQueue.sort((a,b)=>a.at-b.at);
}

function spawnEnemy(type){
  const sm=1+(wave-1)*0.055;
  let e;
  if(type===3){
    e={x:W/2,y:55,type:3,hp:45+wave*6,maxHp:45+wave*6,vx:1.3*sm,vy:0,arm:0,armDir:1,fireTimer:0,flashTimer:0,points:600+wave*60,w:80,h:55};
  } else if(type===2){
    e={x:rand(W-80)+40,y:-35,type:2,hp:4+Math.floor(wave/3),maxHp:4+Math.floor(wave/3),vx:(Math.random()<.5?1:-1)*1.6*sm,vy:1.0*sm,fireTimer:80,flashTimer:0,points:90};
  } else if(type===1){
    e={x:rand(W-60)+30,y:-35,type:1,hp:2,maxHp:2,vx:0,vy:1.7*sm,phase:rand(Math.PI*2),phaseSpd:0.038,amp:55,fireTimer:0,flashTimer:0,points:45};
  } else {
    e={x:rand(W-40)+20,y:-22,type:0,hp:1,maxHp:1,vx:0,vy:(2.3+rand(0.7))*sm,flashTimer:0,points:15};
  }
  enemies.push(e);
}

function spawnParticles(x,y,color,count,spd=3,life=30){
  for(let i=0;i<count;i++){
    const a=rand(Math.PI*2);const s=rand(spd)+0.8;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life,maxLife:life,color,size:rand(2.5)+1.2});
  }
}
function spawnRing(x,y,color,maxR=40){
  particles.push({x,y,vx:0,vy:0,life:28,maxLife:28,color,ring:true,r:4,maxR});
}

function firePlayer(){
  if(player.triple){
    bullets.push({x:player.x-13,y:player.y-14,vy:-BULLET_SPEED,vx:-0.6});
    bullets.push({x:player.x,y:player.y-20,vy:-BULLET_SPEED,vx:0});
    bullets.push({x:player.x+13,y:player.y-14,vy:-BULLET_SPEED,vx:0.6});
  } else {
    bullets.push({x:player.x,y:player.y-20,vy:-BULLET_SPEED,vx:0});
  }
}

function hitPlayer(){
  if(player.shield){
    player.shield=false;player.shieldTimer=0;
    spawnParticles(player.x,player.y,'#4488ff',20,4,32);
    spawnRing(player.x,player.y,'#4488ff',65);
    player.invince=55;return;
  }
  player.lives--;player.hitFlash=22;player.invince=110;
  spawnParticles(player.x,player.y,'#ff4444',22,4.5,42);
  shake.t=14;
  if(player.lives<=0){
    spawnParticles(player.x,player.y,'#ff8800',50,5.5,65);
    spawnRing(player.x,player.y,'#ff4444',90);
    state='gameover';if(score>hiScore)hiScore=score;
  }
}

function update(dt){
  // Stars scroll
  stars.forEach(s=>{
    s.y+=s.spd;
    if(s.tw)s.op=0.45+Math.sin(Date.now()*s.tw)*0.45;
    if(s.y>H){s.y=-4;s.x=rand(W);}
  });

  if(state!=='playing')return;

  // Shake decay
  if(shake.t>0){shake.t--;shake.x=rand(shake.t*0.5+1,-shake.t*0.25);shake.y=rand(shake.t*0.5+1,-shake.t*0.25);}
  else{shake.x=0;shake.y=0;}

  // Combo decay
  if(comboTimer>0)comboTimer--;else combo=0;

  // Player input
  let dx=0,dy=0;
  if(keys['ArrowLeft']||keys['a']||keys['A'])dx=-1;
  if(keys['ArrowRight']||keys['d']||keys['D'])dx=1;
  if(keys['ArrowUp']||keys['w']||keys['W'])dy=-1;
  if(keys['ArrowDown']||keys['s']||keys['S'])dy=1;

  const aim=touchPos||mousePos;
  if(aim&&!(dx||dy)){
    const d=dist(player,aim);
    if(d>12){dx=(aim.x-player.x)/d;dy=(aim.y-player.y)/d;}
  }

  if(dx||dy){const m=Math.hypot(dx,dy)||1;dx/=m;dy/=m;}
  player.vx=lerp(player.vx,dx*player.speed,0.22);
  player.vy=lerp(player.vy,dy*player.speed,0.22);
  player.x=clamp(player.x+player.vx,18,W-18);
  player.y=clamp(player.y+player.vy,40,H-38);
  player.thr=Math.hypot(player.vx,player.vy)>1.2?1:0;

  // Thruster particles
  if(Math.random()<0.65&&player.thr){
    particles.push({x:player.x+rand(10,-5),y:player.y+16,vx:rand(2)-1,vy:rand(3)+1.2,life:14,maxLife:14,color:Math.random()<0.5?'#ff9900':'#ffcc44',size:rand(2.8)+1});
  }

  // Power-up timers
  if(player.shieldTimer>0){player.shieldTimer--;player.shield=player.shieldTimer>0;}
  if(player.tripleTimer>0){player.tripleTimer--;player.triple=player.tripleTimer>0;}
  if(player.invince>0)player.invince--;
  if(player.hitFlash>0)player.hitFlash--;

  // Auto fire
  fireTimer+=dt;
  if(fireTimer>=FIRE_RATE){fireTimer%=FIRE_RATE;firePlayer();}

  // Spawn from queue
  if(!allSpawned){
    spawnTimer++;
    while(spawnQueue.length&&spawnQueue[0].at<=spawnTimer)spawnEnemy(spawnQueue.shift().type);
    if(!spawnQueue.length)allSpawned=true;
  }

  // Update enemies
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];
    if(e.flashTimer>0)e.flashTimer--;

    if(e.type===3){
      e.x+=e.vx;
      if(e.x<55||e.x>W-55)e.vx*=-1;
      e.y=lerp(e.y,78,0.018);
      e.arm+=0.028*e.armDir;
      e.fireTimer++;
      const fr=Math.max(28,58-wave*1.5);
      if(e.fireTimer%fr===0){
        for(let a=-1;a<=1;a++)eBullets.push({x:e.x,y:e.y+32,vx:a*1.8,vy:3.2+Math.abs(a)*0.4,r:7});
        if(e.hp<e.maxHp*0.5){
          for(let a of[-2.5,2.5])eBullets.push({x:e.x,y:e.y+32,vx:a,vy:2.8,r:7});
        }
      }
    } else if(e.type===2){
      e.x+=e.vx;e.y+=e.vy;
      if(e.x<28||e.x>W-28)e.vx*=-1;
      e.fireTimer--;
      if(e.fireTimer<=0){e.fireTimer=75;eBullets.push({x:e.x,y:e.y+20,vx:0,vy:2.8,r:8});}
    } else if(e.type===1){
      e.phase+=e.phaseSpd;
      e.x+=Math.sin(e.phase)*2.8;
      e.y+=e.vy;
    } else {
      e.y+=e.vy;
    }

    if(e.y>H+65){enemies.splice(i,1);continue;}

    // Bullet-enemy collision
    const hitR=(e.type===3)?40:(e.type===2)?19:(e.type===1)?15:11;
    for(let j=bullets.length-1;j>=0;j--){
      const b=bullets[j];
      if(dist(b,e)<hitR+6){
        bullets.splice(j,1);
        e.hp--;e.flashTimer=7;
        combo++;comboTimer=85;
        const pts=Math.round(e.points*(1+combo*0.08));
        score+=pts;if(score>hiScore)hiScore=score;
        spawnParticles(b.x,b.y,'#00ffff',5,2.5,16);
        if(e.hp<=0){
          const cols={0:'#ff7755',1:'#ff55bb',2:'#55ffaa',3:'#ffcc22'};
          const col=cols[e.type]||'#fff';
          const cnt=e.type===3?65:22,spd=e.type===3?6:4.5,lf=e.type===3?65:38;
          spawnParticles(e.x,e.y,col,cnt,spd,lf);
          spawnRing(e.x,e.y,col,e.type===3?90:45);
          // Drop powerup
          const r2=Math.random();
          let pt=-1;
          if(e.type===3)pt=Math.floor(Math.random()*3);
          else if(e.type===2&&r2<0.28)pt=Math.floor(Math.random()*3);
          else if(e.type===1&&r2<0.1)pt=Math.floor(Math.random()*3);
          else if(e.type===0&&r2<0.03)pt=Math.floor(Math.random()*3);
          if(pt>=0)powerups.push({x:e.x,y:e.y,vy:1.5,type:pt,pulse:0,pdir:1});
          enemies.splice(i,1);
          if(e.type===3)waveTimer=100;
        }
        break;
      }
    }
  }

  // Enemy bullets
  for(let i=eBullets.length-1;i>=0;i--){
    const b=eBullets[i];
    b.x+=b.vx;b.y+=b.vy;
    if(b.y>H+25){eBullets.splice(i,1);continue;}
    if(player.invince<=0&&dist(b,player)<(b.r||6)+13){eBullets.splice(i,1);hitPlayer();}
  }

  // Player-enemy collision
  if(player.invince<=0){
    for(const e of enemies){
      const er=(e.type===3)?38:(e.type===2)?18:(e.type===1)?14:11;
      if(dist(player,e)<er+11){hitPlayer();break;}
    }
  }

  // Player bullets out of bounds
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];b.x+=b.vx;b.y+=b.vy;
    if(b.y<-20||b.x<-20||b.x>W+20)bullets.splice(i,1);
  }

  // Power-ups
  for(let i=powerups.length-1;i>=0;i--){
    const p=powerups[i];
    p.y+=p.vy;
    p.pulse+=0.07*p.pdir;
    if(p.pulse>1||p.pulse<0)p.pdir*=-1;
    if(p.y>H+20){powerups.splice(i,1);continue;}
    if(dist(p,player)<23){
      if(p.type===0){player.shield=true;player.shieldTimer=420;spawnParticles(player.x,player.y,'#4488ff',14,3.5,30);}
      else if(p.type===1){player.triple=true;player.tripleTimer=360;spawnParticles(player.x,player.y,'#ff44ff',14,3.5,30);}
      else if(p.type===2){player.speed=6.8;setTimeout(()=>{if(state==='playing')player.speed=PLAYER_SPEED;},5000);spawnParticles(player.x,player.y,'#44ff88',14,3.5,30);}
      powerups.splice(i,1);
    }
  }

  // Particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;
    p.vx*=0.92;p.vy*=0.92;
    p.life--;
    if(p.ring)p.r=lerp(4,p.maxR,1-p.life/p.maxLife);
    if(p.life<=0)particles.splice(i,1);
  }

  // Wave completion
  if(allSpawned&&enemies.length===0){
    if(waveTimer>0)waveTimer--;
    else{wave++;buildWave(wave);}
  }
}

// === DRAW ===
function drawShip(p){
  const flash=p.hitFlash>0&&Math.floor(p.hitFlash/3)%2===0;
  const inv=p.invince>0&&p.hitFlash<=0&&Math.floor(p.invince/5)%2===0;
  if(inv)return;
  ctx.save();ctx.translate(p.x,p.y);
  // Engine flame
  if(p.thr){
    ctx.shadowBlur=22;ctx.shadowColor='#ff8800';
    ctx.fillStyle='rgba(255,160,0,0.75)';
    ctx.beginPath();
    const fl=9+rand(10);
    ctx.moveTo(-7,15);ctx.lineTo(7,15);ctx.lineTo(4,15+fl);ctx.lineTo(0,13+fl+rand(6));ctx.lineTo(-4,15+fl);
    ctx.closePath();ctx.fill();ctx.shadowBlur=0;
  }
  ctx.shadowBlur=flash?35:14;ctx.shadowColor=flash?'#ff5555':'#00ddff';
  ctx.fillStyle=flash?'#ff7777':'#00ccdd';
  ctx.beginPath();
  ctx.moveTo(0,-23);ctx.lineTo(-17,13);ctx.lineTo(-8,7);ctx.lineTo(0,11);ctx.lineTo(8,7);ctx.lineTo(17,13);
  ctx.closePath();ctx.fill();
  ctx.shadowBlur=6;
  ctx.fillStyle=flash?'#ffaaaa':'#aaffff';
  ctx.beginPath();ctx.moveTo(0,-17);ctx.lineTo(-5,5);ctx.lineTo(0,9);ctx.lineTo(5,5);ctx.closePath();ctx.fill();
  ctx.shadowBlur=9;
  ctx.fillStyle=flash?'#ffcccc':'#eeffff';
  ctx.beginPath();ctx.ellipse(0,-8,4,7,0,0,Math.PI*2);ctx.fill();
  if(p.shield){
    ctx.shadowBlur=22;ctx.shadowColor='#5599ff';
    ctx.strokeStyle=`rgba(100,180,255,${0.5+Math.sin(Date.now()*0.006)*0.28})`;
    ctx.lineWidth=2.5;
    ctx.beginPath();ctx.arc(0,0,29,0,Math.PI*2);ctx.stroke();
  }
  ctx.restore();
}

function drawEnemy(e){
  const fl=e.flashTimer>0;
  ctx.save();ctx.translate(e.x,e.y);

  if(e.type===3){
    const hr=e.hp/e.maxHp;
    const enraged=hr<0.5;
    ctx.shadowBlur=fl?45:22;
    ctx.shadowColor=fl?'#ffffff':enraged?'#ff4444':'#ff9900';
    ctx.fillStyle=fl?'#ffffff':enraged?'#cc2222':'#cc5500';
    ctx.beginPath();
    for(let i=0;i<8;i++){const a=(i/8)*Math.PI*2-Math.PI/2;const r=i%2===0?40:25;i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);}
    ctx.closePath();ctx.fill();
    ctx.shadowBlur=12;ctx.fillStyle=fl?'#ffffff':enraged?'#ff5533':'#ff7700';
    for(let side of[-1,1]){
      ctx.save();ctx.rotate(e.arm*side);
      ctx.beginPath();ctx.moveTo(22*side,0);ctx.lineTo(56*side,-16);ctx.lineTo(62*side,0);ctx.lineTo(56*side,16);ctx.closePath();ctx.fill();
      ctx.restore();
    }
    ctx.shadowBlur=18;ctx.fillStyle='#ffee00';
    ctx.beginPath();ctx.arc(0,-5,11,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=enraged?'#ff0000':'#cc0000';
    ctx.beginPath();ctx.arc(0,-5,6,0,Math.PI*2);ctx.fill();
    if(enraged){
      ctx.shadowBlur=10;ctx.shadowColor='#ff0000';
      ctx.strokeStyle='rgba(255,0,0,0.6)';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(0,-5,15+Math.sin(Date.now()*0.01)*3,0,Math.PI*2);ctx.stroke();
    }
    // HP bar
    ctx.shadowBlur=0;
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(-42,34,84,9);
    ctx.fillStyle=hr>0.5?'#44ff88':hr>0.25?'#ffcc00':'#ff4444';
    ctx.fillRect(-42,34,84*hr,9);
    ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.lineWidth=1;ctx.strokeRect(-42,34,84,9);

  } else if(e.type===2){
    ctx.shadowBlur=fl?28:11;ctx.shadowColor=fl?'#ffffff':'#44ffaa';
    ctx.fillStyle=fl?'#ffffff':'#1a7745';
    ctx.beginPath();
    for(let i=0;i<6;i++){const a=(i/6)*Math.PI*2-Math.PI/2;i===0?ctx.moveTo(Math.cos(a)*19,Math.sin(a)*19):ctx.lineTo(Math.cos(a)*19,Math.sin(a)*19);}
    ctx.closePath();ctx.fill();
    ctx.fillStyle=fl?'#ccffdd':'#88ffcc';
    ctx.beginPath();
    for(let i=0;i<6;i++){const a=(i/6)*Math.PI*2-Math.PI/2;i===0?ctx.moveTo(Math.cos(a)*10,Math.sin(a)*10):ctx.lineTo(Math.cos(a)*10,Math.sin(a)*10);}
    ctx.closePath();ctx.fill();
    if(e.maxHp>1){
      for(let i=0;i<e.maxHp;i++){
        ctx.fillStyle=i<e.hp?'#44ffaa':'rgba(255,255,255,0.18)';
        ctx.shadowBlur=i<e.hp?6:0;ctx.shadowColor='#44ffaa';
        ctx.beginPath();ctx.arc(-7+(i*5.5),23,2.5,0,Math.PI*2);ctx.fill();
      }
    }

  } else if(e.type===1){
    ctx.shadowBlur=fl?28:11;ctx.shadowColor=fl?'#ffffff':'#ff44aa';
    ctx.fillStyle=fl?'#ffffff':'#cc1a66';
    ctx.beginPath();ctx.moveTo(0,-17);ctx.lineTo(13,0);ctx.lineTo(0,15);ctx.lineTo(-13,0);ctx.closePath();ctx.fill();
    ctx.fillStyle=fl?'#ffaacc':'#ff88cc';
    ctx.beginPath();ctx.moveTo(-13,0);ctx.lineTo(-24,-9);ctx.lineTo(-15,7);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(13,0);ctx.lineTo(24,-9);ctx.lineTo(15,7);ctx.closePath();ctx.fill();

  } else {
    ctx.shadowBlur=fl?28:9;ctx.shadowColor=fl?'#ffffff':'#ff6644';
    ctx.fillStyle=fl?'#ffffff':'#dd2211';
    ctx.beginPath();ctx.moveTo(0,-14);ctx.lineTo(11,10);ctx.lineTo(0,5);ctx.lineTo(-11,10);ctx.closePath();ctx.fill();
  }
  ctx.restore();
}

function drawBullet(b){
  ctx.save();
  ctx.shadowBlur=16;ctx.shadowColor='#00ffff';
  ctx.fillStyle='#aaffff';
  ctx.beginPath();
  const angle=Math.atan2(b.vy,b.vx)+Math.PI/2;
  ctx.ellipse(b.x,b.y,3,8,angle,0,Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function drawEBullet(b){
  ctx.save();
  ctx.shadowBlur=14;ctx.shadowColor='#ff4444';
  ctx.fillStyle='#ff8888';
  ctx.beginPath();ctx.arc(b.x,b.y,b.r||5,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawPowerup(p){
  const cols=['#4499ff','#ff44ff','#44ff99','#ff4466'];
  const icons=['S','3','Z','♥'];
  const col=cols[p.type];
  const pulse=0.72+p.pulse*0.28;
  ctx.save();ctx.translate(p.x,p.y);
  ctx.shadowBlur=18;ctx.shadowColor=col;
  ctx.globalAlpha=pulse;
  ctx.save();ctx.rotate(Date.now()*0.0022);
  ctx.strokeStyle=col;ctx.lineWidth=2;
  ctx.beginPath();
  for(let i=0;i<8;i++){const a=(i/8)*Math.PI*2;i===0?ctx.moveTo(Math.cos(a)*15,Math.sin(a)*15):ctx.lineTo(Math.cos(a)*15,Math.sin(a)*15);}
  ctx.closePath();ctx.stroke();ctx.restore();
  ctx.fillStyle=col+'40';ctx.beginPath();ctx.arc(0,0,12,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;ctx.fillStyle=col;
  ctx.font='bold 12px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(icons[p.type]||'?',0,0);
  ctx.restore();
}

function drawHUD(){
  ctx.save();
  // Score
  ctx.shadowBlur=12;ctx.shadowColor='#00ffff';ctx.fillStyle='#aaffff';
  ctx.font='bold 21px monospace';ctx.textAlign='center';
  ctx.fillText(score.toLocaleString(),W/2,26);
  // Lives
  ctx.textAlign='left';ctx.font='19px monospace';
  for(let i=0;i<3;i++){
    ctx.fillStyle=i<player.lives?'#ff4466':'rgba(255,255,255,0.14)';
    ctx.shadowBlur=i<player.lives?9:0;ctx.shadowColor='#ff4466';
    ctx.fillText('♥',10+i*24,26);
  }
  // Wave
  ctx.textAlign='right';ctx.fillStyle='rgba(190,220,255,0.65)';ctx.shadowBlur=5;ctx.shadowColor='#8888ff';
  ctx.font='12px monospace';ctx.fillText('WAVE '+wave,W-10,26);
  // Combo
  if(combo>=3&&comboTimer>0){
    const al=Math.min(1,comboTimer/25);
    ctx.globalAlpha=al;ctx.textAlign='center';
    ctx.fillStyle='#ffcc00';ctx.shadowColor='#ff8800';ctx.shadowBlur=16;
    ctx.font='bold 15px monospace';ctx.fillText('×'+combo+' COMBO',W/2,50);
    ctx.globalAlpha=1;
  }
  // Power-up bars
  let bx=10,by=H-14;
  if(player.shield){
    const t=player.shieldTimer/420;
    ctx.shadowBlur=0;ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(bx,by-11,58,8);
    ctx.fillStyle='#4488ff';ctx.fillRect(bx,by-11,58*t,8);
    ctx.fillStyle='#99ccff';ctx.font='10px monospace';ctx.textAlign='left';ctx.fillText('SHIELD',bx,by);
    bx+=66;
  }
  if(player.triple){
    const t=player.tripleTimer/360;
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(bx,by-11,58,8);
    ctx.fillStyle='#ff44ff';ctx.fillRect(bx,by-11,58*t,8);
    ctx.fillStyle='#ffaaff';ctx.font='10px monospace';ctx.textAlign='left';ctx.fillText('3-SHOT',bx,by);
  }
  ctx.restore();
}

function drawMenu(){
  ctx.save();
  ctx.textAlign='center';
  // NOVA
  ctx.shadowBlur=35;ctx.shadowColor='#00ffff';ctx.fillStyle='#00eeff';
  ctx.font='bold 56px monospace';ctx.fillText('NOVA',W/2,H/2-90);
  // DRIFT
  ctx.shadowColor='#ff44ff';ctx.fillStyle='#ff44ff';
  ctx.font='bold 56px monospace';ctx.fillText('DRIFT',W/2,H/2-26);
  // Subtitle
  ctx.shadowBlur=8;ctx.shadowColor='#aaffff';ctx.fillStyle='rgba(180,240,255,0.7)';
  ctx.font='14px monospace';ctx.fillText('SPACE SHOOTER',W/2,H/2+14);
  // Instructions
  ctx.shadowBlur=0;ctx.fillStyle='rgba(160,210,255,0.45)';ctx.font='12px monospace';
  ctx.fillText('Arrow keys / WASD to move',W/2,H/2+55);
  ctx.fillText('Mouse or touch to aim',W/2,H/2+74);
  ctx.fillText('Auto-fire is always on',W/2,H/2+93);
  // Blinking press
  const pulse=0.55+Math.sin(Date.now()*0.0038)*0.45;
  ctx.globalAlpha=pulse;ctx.shadowBlur=18;ctx.shadowColor='#00ffff';
  ctx.fillStyle='#00ffff';ctx.font='bold 17px monospace';
  ctx.fillText('[ CLICK / TAP TO PLAY ]',W/2,H/2+145);
  // High score
  if(hiScore>0){
    ctx.globalAlpha=0.55;ctx.shadowBlur=0;ctx.fillStyle='#aaffff';
    ctx.font='12px monospace';ctx.fillText('BEST: '+hiScore.toLocaleString(),W/2,H/2+178);
  }
  ctx.restore();
}

function drawGameOver(){
  ctx.save();
  ctx.fillStyle='rgba(3,1,10,0.78)';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.shadowBlur=22;ctx.shadowColor='#ff4444';ctx.fillStyle='#ff6666';
  ctx.font='bold 46px monospace';ctx.fillText('GAME',W/2,H/2-82);ctx.fillText('OVER',W/2,H/2-28);
  ctx.shadowBlur=12;ctx.shadowColor='#aaffff';ctx.fillStyle='#aaffff';
  ctx.font='bold 26px monospace';ctx.fillText(score.toLocaleString(),W/2,H/2+22);
  ctx.shadowBlur=0;ctx.fillStyle='rgba(190,220,255,0.55)';ctx.font='13px monospace';
  ctx.fillText('WAVE '+wave,W/2,H/2+47);
  if(score>0&&score>=hiScore){
    ctx.fillStyle='#ffcc00';ctx.shadowColor='#ff8800';ctx.shadowBlur=14;
    ctx.font='14px monospace';ctx.fillText('★ NEW HIGH SCORE ★',W/2,H/2+72);
  } else if(hiScore>0){
    ctx.fillStyle='rgba(180,220,255,0.45)';ctx.font='12px monospace';
    ctx.fillText('BEST: '+hiScore.toLocaleString(),W/2,H/2+72);
  }
  const pulse=0.55+Math.sin(Date.now()*0.0038)*0.45;
  ctx.globalAlpha=pulse;ctx.shadowBlur=16;ctx.shadowColor='#00ffff';
  ctx.fillStyle='#00ffff';ctx.font='bold 16px monospace';
  ctx.fillText('[ PLAY AGAIN ]',W/2,H/2+114);
  ctx.restore();
}

function render(){
  ctx.fillStyle='#03010a';ctx.fillRect(0,0,W,H);
  if(nebulaCanvas)ctx.drawImage(nebulaCanvas,0,0);
  // Stars
  for(const s of stars){
    ctx.globalAlpha=s.op;ctx.fillStyle='#ffffff';
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;

  if(state==='menu'){drawMenu();return;}

  ctx.save();ctx.translate(shake.x,shake.y);
  for(const p of powerups)drawPowerup(p);
  for(const b of bullets)drawBullet(b);
  for(const b of eBullets)drawEBullet(b);
  for(const e of enemies)drawEnemy(e);
  if(state==='playing')drawShip(player);

  // Particles
  for(const p of particles){
    const al=p.life/p.maxLife;
    ctx.save();ctx.globalAlpha=al;
    if(p.ring){
      ctx.shadowBlur=11;ctx.shadowColor=p.color;ctx.strokeStyle=p.color;ctx.lineWidth=2.5;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.stroke();
    } else {
      ctx.shadowBlur=9;ctx.shadowColor=p.color;ctx.fillStyle=p.color;
      ctx.beginPath();ctx.arc(p.x,p.y,p.size*(0.4+al*0.6),0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
  }
  ctx.restore();

  drawHUD();
  if(state==='gameover')drawGameOver();
}

function loop(ts){
  const dt=Math.min(33,ts-lastTime);lastTime=ts;
  update(dt);render();
  requestAnimationFrame(loop);
}

buildNebula();initStars();
requestAnimationFrame(loop);
</script>
</body>
</html>
